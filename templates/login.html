<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Fashion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style_login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <header class="header">
        <nav class="nav">
            <div class="logo">
                <img src="../static/img/logo_fashion.png" alt="Logo Fashion Breiner" width="80px">
            </div>
            <div class="search">
                <input type="text" placeholder="Buscar..." id="searchInput">
                <button type="button"><i class='bx bx-search'></i></button>  
            </div>
            <ul class="nav-links">
                <li><a href="#home">Inicio</a></li>
                <li><a href="#about">Nosotros</a></li>
                <li><a href="#products">Productos</a></li>
                <li><a href="#contact">Contacto</a></li>
                <li>
                    <a href="#carrito" class="cart-icon">
                        <i class='bx bx-cart' id="icarrito"></i>
                    </a>
                </li>
            </ul>
            
            <div class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>   
                <span></span>
            </div>
            
            <div class="mobile-menu" id="mobileMenu">
                <a href="#home">Inicio</a>
                <a href="#products">Productos</a>
                <a href="#about">Nosotros</a>
                <a href="#contact">Contacto</a>
                <a href="#carrito">Carrito</a>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <video autoplay muted id="videoFondo">
            <source src="../static/img/fondo_login.mp4" type="video/mp4">
        </video>

        <div class="formulario">
            <h1>Bienvenid@</h1>
            <form action="#" method="post">
                <div class="datos">
                    <input type="email" name="email" required placeholder="Correo electrónico"> 
                    <i class='bx bx-user'></i>
                </div>
                <div class="datos">
                    <input type="password" name="password" required placeholder="Contraseña">
                    <i class='bx bx-lock-alt'></i>
                </div>
                <div class="recordar">
                    <a href="#">¿Olvidaste la contraseña?</a>
                </div>
                <button class="boton" type="submit">Entrar</button>
                <div class="registrase">
                    <p>Quiero <a href="#">registrarme</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="../static/js/login.js"></script>
</body>
</html>
